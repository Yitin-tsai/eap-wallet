server:
  port: 8081
  servlet:
    context-path: /eap-wallet

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eapdb
    username: admin
    password: admin123
  liquibase:
    enabled: true                               
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: dev                                 
    drop-first: false
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
  data:
    redis:
      host: localhost
      port: 6379  
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    '[com.eap.eap_order]': DEBUG
    '[org.springframework.web]': DEBUG
